<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Card Battle Royale Mabar</title>
<style>
body { margin:0; overflow:hidden; background:#111; color:white; font-family:sans-serif;}
#menu {position:absolute; top:0; left:0; width:100%; height:100%; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center;}
canvas { display:block; }

input, textarea, button {
  margin:5px;
  padding:10px;
  border-radius:10px;
  border:none;
}

#joystick {
  position:absolute;
  bottom:80px;
  left:30px;
  width:100px;
  height:100px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
}

#stick {
  width:40px;
  height:40px;
  background:white;
  border-radius:50%;
  position:absolute;
  left:30px;
  top:30px;
}

#bagBtn {
  position:absolute;
  bottom:90px;
  left:150px;
  padding:15px;
  background:orange;
  border-radius:10px;
}

#skills {
  position:absolute;
  bottom:150px;
  left:150px;
  background:#222;
  padding:10px;
  display:none;
}
</style>
</head>

<body>

<div id="menu">
  <h1>Card Battle Royale</h1>
  <input type="file" id="imgInput">
  <input type="text" id="nameInput" placeholder="Nama karakter">
  <textarea id="powerInput" placeholder="Deskripsi kekuatan"></textarea>
  <button onclick="startGame()">Mulai</button>
</div>

<canvas id="game"></canvas>

<div id="joystick"><div id="stick"></div></div>
<button id="bagBtn">🎒</button>
<div id="skills"></div>

<script type="module">
  
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

let gameStarted = false;
let teamAssigned = false;
  
const firebaseConfig = {
   apiKey : "AIzaSyCPoQ1GJZOEEpUl4vBTkKO0Uffb-UfiUE8" , 
  authDomain : "game-card-batle-royle.firebaseapp.com" , 
  projectId : "game-card-batle-royle" , 
  storageBucket : "game-card-batle-royle.firebasestorage.app" , 
  messagingSenderId : "985497599472" , 
  appId : "1:985497599472:web:54ddad05e7acdc56deb135" , 
  measurementId : "G-1DHL78BYNC",
  databaseURL: "https://game-card-batle-royle-default-rtdb.firebaseio.com/",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const playerId = "player_" + Math.random().toString(36).substr(2, 9);

let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let players = {};
let myData = {x:200, y:200, name:"", power:"", img:null};

  let jungles = [];

for(let i=0;i<30;i++){
  jungles.push({
    x: Math.random()*2000,
    y: Math.random()*2000
  });
}

function assignTeam(){
  const teamRef = ref(db, "game/team");

  onValue(teamRef, snapshot=>{
    let data = snapshot.val();

    if(!data){
      // Player pertama
      let team = Math.random() > 0.5 ? "red" : "blue";

      set(teamRef, {
        p1: team,
        p2: team === "red" ? "blue" : "red"
      });

      myData.team = team;
    } else {
      // Player kedua
      if(!teamAssigned){
        myData.team = data.p2;
        teamAssigned = true;
      }
    }

    setSpawn();
  });
}
  
// 🎮 Upload gambar
document.getElementById("imgInput").onchange = e => {
  let file = e.target.files[0];
  let reader = new FileReader();
  reader.onload = () => {
    let img = new Image();
    img.src = reader.result;
    myData.img = img;
  };
  reader.readAsDataURL(file);
};

// ▶️ Start game
window.startGame = () => {
  myData.name = document.getElementById("nameInput").value;
  myData.power = document.getElementById("powerInput").value;

  document.getElementById("menu").style.display = "none";

  assignTeam();

  setInterval(update, 1000/60);
};

// 🔄 Update ke Firebase
function sendData(){
  set(ref(db, "players/" + playerId), {
    x: myData.x,
    y: myData.y,
    name: myData.name,
    power: myData.power,
    team: myData.team || "none"
  });
}

  function setSpawn(){
  if(myData.team === "blue"){
    myData.x = 100;
    myData.y = canvas.height - 150;
  } else {
    myData.x = canvas.width - 150;
    myData.y = 100;
  }
  }

// 👀 Ambil data player lain
onValue(ref(db, "players"), snapshot=>{
  players = snapshot.val() || {};
});

// 🕹️ JOYSTICK
let stick = document.getElementById("stick");
let joy = document.getElementById("joystick");

let dragging = false;

joy.addEventListener("touchstart", ()=> dragging=true);
joy.addEventListener("touchend", ()=>{
  dragging=false;
  stick.style.left="30px";
  stick.style.top="30px";
});

joy.addEventListener("touchmove", e=>{
  if(!dragging) return;

  let rect = joy.getBoundingClientRect();
  let x = e.touches[0].clientX - rect.left;
  let y = e.touches[0].clientY - rect.top;

  stick.style.left = (x-20)+"px";
  stick.style.top = (y-20)+"px";

  myData.x += (x-50)/20;
  myData.y += (y-50)/20;
});

// 🎒 BAG SKILL
let bag = document.getElementById("bagBtn");
let skills = document.getElementById("skills");

bag.onclick = ()=>{
  skills.style.display = skills.style.display==="none" ? "block" : "none";

  skills.innerHTML = "";
  let words = myData.power.split(" ");

  words.forEach(w=>{
    let btn = document.createElement("button");
    btn.innerText = w;

    btn.onclick = ()=>{
      alert("Serang pakai: " + w);
    };

    skills.appendChild(btn);
  });
};
  
//==== UPDATE ====
function update(){
  // Bersihin layar
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let camX = myData.x - canvas.width / 2;
let camY = myData.y - canvas.height / 2;

let worldWidth = 2000;
let worldHeight = 2000;

ctx.fillStyle = "#2e7d32";
ctx.fillRect(-camX, -camY, worldWidth, worldHeight);
  
  // ===== ARENA =====

// 🟩 TANAH
for(let x=0; x<2000; x+=50){
  for(let y=0; y<2000; y+=50){
    ctx.fillStyle = (x+y)%100===0 ? "#2e7d32" : "#388e3c";
    ctx.fillRect(x - camX, y - camY, 50, 50);
  }
}

  // garis arena (biar keren)
ctx.strokeStyle = "#ffffff22";
for(let i=0;i<canvas.width;i+=100){
  ctx.beginPath();
  ctx.moveTo(i,0);
  ctx.lineTo(i,canvas.height);
  ctx.stroke();
}

  myData.x = Math.max(0, Math.min(2000, myData.x));
myData.y = Math.max(0, Math.min(2000, myData.y));

// 🌊 SUNGAI (tengah)
ctx.fillStyle = "#1976d2";
ctx.beginPath();
ctx.moveTo(canvas.width/2 - 80, 0);
ctx.lineTo(canvas.width/2 + 80, 0);
ctx.lineTo(canvas.width/2 + 40, canvas.height);
ctx.lineTo(canvas.width/2 - 40, canvas.height);
ctx.closePath();
ctx.fill();

// 🌿 JUNGLE (random batu/rumput)
ctx.fillStyle = "#1b5e20";
jungles.forEach(j=>{
  ctx.beginPath();
  ctx.ellipse(
    j.x - camX,
    j.y - camY,
    30, 20,
    0, 0, Math.PI*2
  );
  ctx.fill();
});

 ctx.strokeStyle = "#000";
ctx.lineWidth = 10;
ctx.strokeRect(-camX, -camY, 2000, 2000); 

  // base biru
ctx.fillStyle = "#0d47a1";
ctx.beginPath();
ctx.arc(100 - camX, 1800 - camY, 60, 0, Math.PI*2);
ctx.fill();

// base merah
ctx.fillStyle = "#b71c1c";
ctx.beginPath();
ctx.arc(1800 - camX, 100 - camY, 60, 0, Math.PI*2);
ctx.fill();

  // Kirim data ke Firebase
  sendData();

  ctx.fillStyle = "rgba(0,0,0,0.3)";
ctx.beginPath();
ctx.arc(drawX+25, drawY+55, 20, 0, Math.PI*2);
ctx.fill();

  // Gambar semua player
  for(let id in players){
    let p = players[id];
    if(!p) continue;

    // warna berdasarkan tim
    ctx.fillStyle = p.team === "blue" ? "cyan" : "red";

    // karakter
    let drawX = p.x - camX;
let drawY = p.y - camY;

// kalau ada gambar
if(id === playerId && myData.img){
  ctx.drawImage(myData.img, drawX, drawY, 60, 60);
}else{
  // player lain (sementara kotak)
  ctx.fillStyle = p.team === "blue" ? "cyan" : "red";
  ctx.fillRect(drawX, drawY, 50, 50);
}

    // nama
  ctx.fillStyle = "white";
ctx.fillText(p.name || "player", drawX, drawY - 10);
  }
}
  
</script>

</body>
  </html>
